<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RelayCI</title>
<style>
/* Design tokens adapted from doc/Relay CI.dc.html. Google Fonts CDN swapped for system font
   stacks: the spec (§1/§3) requires zero CDN / internet dependency (LAN-only deployment). */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,'Segoe UI',system-ui,'Yu Gothic UI',sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--accent);color:#fff}
input,button,select,textarea{font-family:inherit}
button{cursor:pointer}

:root, [data-theme="dark"]{
  --bg:#0c0e12;--surface:#14171d;--surface-2:#1a1e26;--surface-3:#20252f;
  --border:#242a34;--border-2:#333b47;
  --text:#e7ebf2;--text-2:#98a2b2;--text-3:#616b7b;
  --accent:#6d5cf0;--accent-2:#a394ff;--accent-soft:rgba(109,92,240,.18);
  --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.4);
  --st-success:#34d17f;--st-success-soft:#123020;
  --st-failed:#f76d6d;--st-failed-soft:#331515;
  --st-running:#f0b429;--st-running-soft:#332612;
  --st-queued:#8b95a5;--st-queued-soft:#1e242e;
  --st-waiting:#6ea8ff;--st-waiting-soft:#132238;
  --st-aborted:#b8b19f;--st-aborted-soft:#26251f;
  --term-bg:#08090d;--term-line:#12161d;--term-text:#c6cede;--term-dim:#5a6474;
}
[data-theme="light"]{
  --bg:#eceff3;--surface:#ffffff;--surface-2:#f4f6f9;--surface-3:#e9edf2;
  --border:#e2e6ec;--border-2:#ccd2dc;
  --text:#12151b;--text-2:#586173;--text-3:#8b94a4;
  --accent:#6d5cf0;--accent-2:#4a3ad0;--accent-soft:rgba(109,92,240,.12);
  --shadow:0 1px 2px rgba(20,25,35,.06),0 6px 16px rgba(20,25,35,.06);
  --st-success:#12915a;--st-success-soft:#dcf3e8;
  --st-failed:#d43a3a;--st-failed-soft:#fbe3e3;
  --st-running:#c47d0a;--st-running-soft:#fbeecf;
  --st-queued:#5b6472;--st-queued-soft:#e7eaef;
  --st-waiting:#2f6fd0;--st-waiting-soft:#e2ecfb;
  --st-aborted:#8a8578;--st-aborted-soft:#ecece4;
  --term-bg:#0d1016;--term-line:#161b22;--term-text:#c6cede;--term-dim:#6b7686;
}
@media (prefers-color-scheme: light) { :root:not([data-theme]) { color-scheme: light; } }

@keyframes rc-pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes rc-spin{to{transform:rotate(360deg)}}
@keyframes rc-blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes rc-fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade{animation:rc-fade .2s ease}
.spin{animation:rc-spin .9s linear infinite}
.pulse{animation:rc-pulse 1.4s ease-in-out infinite}

::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:6px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}

body{background:var(--bg);color:var(--text);font-size:13px;line-height:1.45}
.mono{font-family:ui-monospace,'Cascadia Code',Consolas,'SF Mono',monospace}
.display{font-weight:600;letter-spacing:-.02em}

#shell{display:grid;grid-template-columns:216px 1fr;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
header{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 16px 0 18px;background:var(--surface);border-bottom:1px solid var(--border);z-index:20}
.logo{display:flex;align-items:center;gap:9px;width:198px;cursor:pointer}
.logo .mark{width:24px;height:24px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo .mark span{width:9px;height:9px;border:2.2px solid #fff;border-radius:50%;border-right-color:transparent}
.logo .word{font-weight:700;font-size:15px;letter-spacing:-.02em}
.logo .word b{color:var(--accent-2);font-weight:700}
.searchbox{flex:1;max-width:420px;display:flex;align-items:center;gap:8px;padding:6px 11px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text-3)}
.searchbox input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12.5px}
.searchbox input::placeholder{color:var(--text-3)}
.iconbtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text-2)}
.iconbtn:hover{color:var(--text);border-color:var(--border-2)}

nav{background:var(--surface);border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text-2);font-size:13px}
.navitem:hover{background:var(--surface-2)}
.navitem.active{color:var(--text);background:var(--accent-soft);font-weight:600}
.navitem svg{flex-shrink:0}
.navitem .badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--surface-3);color:var(--text-2)}
.navsep{height:1px;background:var(--border);margin:12px 6px}
.navlabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:4px 10px 6px}
.runnerbox{padding:8px 10px;display:flex;flex-direction:column;gap:9px;font-size:12px}
.runnerrow{display:flex;align-items:center;justify-content:space-between}
.bar{height:5px;border-radius:3px;background:var(--surface-3);overflow:hidden}
.bar>div{height:100%;background:var(--st-running)}
.healthdot{width:7px;height:7px;border-radius:50%;background:var(--st-success);box-shadow:0 0 7px var(--st-success);flex-shrink:0}

main{overflow-y:auto;position:relative}
.page{padding:22px 26px 40px}
.crumb{font-size:12px;color:var(--text-3);margin-bottom:10px}
.crumb span.link{cursor:pointer}
.crumb span.link:hover{color:var(--text-2)}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
h1{font-size:22px;margin:0 0 3px}
.sub{color:var(--text-2);margin:0;font-size:13px}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border-2);background:var(--surface);color:var(--text)}
.btn:hover{border-color:var(--text-3)}
.btn.primary{background:var(--accent);border:none;color:#fff;box-shadow:0 5px 14px -7px var(--accent)}
.btn.primary:hover{background:var(--accent-2)}
.btn.danger{background:var(--st-failed-soft);border:1px solid var(--st-failed);color:var(--st-failed)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.statcard{padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.statcard .lbl{display:flex;align-items:center;gap:7px;color:var(--text-2);font-size:11.5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.statcard .dot{width:8px;height:8px;border-radius:2px}
.statcard .val{font-size:26px;font-weight:600;letter-spacing:-.02em}
.statcard .sub{font-size:11px;color:var(--text-3);margin-top:2px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.thead{display:grid;gap:12px;padding:9px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3)}
.trow{display:grid;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center}
.trow:last-child{border-bottom:none}
.trow.clickable{cursor:pointer}
.trow.clickable:hover{background:var(--surface-2)}

.badge-status{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge-status .d{width:6px;height:6px;border-radius:50%}

.sparkline{display:flex;gap:3px;align-items:flex-end;height:26px}
.sparkline span{flex:1;border-radius:2px;min-width:5px}

.emptystate{padding:48px;text-align:center;background:var(--surface);border:1px dashed var(--border-2);border-radius:12px;color:var(--text-3)}

.buildhead{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
.gantt{margin-top:14px;display:flex;gap:2px;height:8px;border-radius:4px;overflow:hidden;background:var(--surface-3)}

.step{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.stephead{display:grid;grid-template-columns:26px 1fr auto auto;gap:12px;align-items:center;padding:11px 14px;cursor:pointer}
.stephead:hover{background:var(--surface-2)}
.stepicon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.steplog{max-height:420px;overflow-y:auto;background:var(--term-bg);border-top:1px solid var(--border);padding:11px 0;font-size:11.5px;line-height:1.65}
.logline{display:flex;padding:0 14px;white-space:pre-wrap;word-break:break-word}
.logline:hover{background:var(--term-line)}
.logline .t{color:var(--term-dim);flex-shrink:0;width:88px;user-select:none}
.logline .m{flex:1;color:var(--term-text)}
.cursor{display:inline-block;width:8px;height:14px;background:var(--st-running);animation:rc-blink 1s step-end infinite;vertical-align:middle}

.hint{padding:11px 13px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;font-size:11.5px;color:var(--text-2)}

.tabbar{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tab{padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-2);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .count{font-family:ui-monospace,'Cascadia Code',Consolas,'SF Mono',monospace;font-size:10px;padding:1px 6px;border-radius:9px;background:var(--surface-3);color:var(--text-2)}
.tab .count.fail{background:var(--st-failed-soft);color:var(--st-failed)}

#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:320px;padding:28px 26px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.login-card .logo{width:auto;cursor:default;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;color:var(--text-2);margin-bottom:5px}
.field input{width:100%;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none}
.field input:focus{border-color:var(--accent)}
.login-error{font-size:12px;color:var(--st-failed);margin-bottom:12px;display:none}
.userchip{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 6px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;position:relative}
.userchip .av{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex-shrink:0}
.userchip .role{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-3)}
.usermenu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:170px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);padding:6px;z-index:30}
.usermenu.open{display:block}
.usermenu .mi{padding:8px 10px;border-radius:7px;font-size:12.5px;cursor:pointer;color:var(--text-2)}
.usermenu .mi:hover{background:var(--surface-2);color:var(--text)}
.rolesel{padding:5px 8px;border-radius:6px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:12px}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card fade">
    <div class="logo"><div class="mark"><span></span></div> <span class="word display">Relay<b>CI</b></span></div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form" onsubmit="return onLoginSubmit(event)">
      <div class="field"><label>Username</label><input id="login-username" autocomplete="username" required></div>
      <div class="field"><label>Password</label><input id="login-password" type="password" autocomplete="current-password" required></div>
      <button class="btn primary" type="submit" style="width:100%" id="login-submit">Sign in</button>
    </form>
  </div>
</div>
<div id="shell" style="display:none">
  <header>
    <div class="logo" onclick="navigate('/jobs')">
      <div class="mark"><span></span></div>
      <span class="word display">Relay<b>CI</b></span>
    </div>
    <div class="searchbox" id="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search-input" placeholder="Filter jobs…" oninput="onSearch(this.value)">
    </div>
    <div style="flex:1"></div>
    <button class="iconbtn" title="Toggle theme" onclick="toggleTheme()"><span id="theme-icon"></span></button>
    <div class="userchip" id="user-chip" onclick="toggleUserMenu(event)" style="display:none">
      <span class="av" id="user-av"></span>
      <span><span id="user-name"></span><br><span class="role" id="user-role"></span></span>
      <div class="usermenu" id="user-menu">
        <div class="mi" id="user-menu-username"></div>
        <div class="mi" onclick="doLogout()">Sign out</div>
      </div>
    </div>
  </header>
  <nav>
    <div class="navitem" data-nav="jobs" onclick="navigate('/jobs')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Jobs</span><span class="badge" id="nav-running-badge" style="display:none"></span>
    </div>
    <div class="navitem" data-nav="queue" onclick="navigate('/queue')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h12"/></svg>
      <span>Queue</span><span class="badge" id="nav-queue-badge" style="display:none"></span>
    </div>
    <div class="navitem" data-nav="admin" id="nav-admin" onclick="navigate('/admin')" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
      <span>Admin</span>
    </div>
    <div class="navsep"></div>
    <div class="navlabel">Runner</div>
    <div class="runnerbox">
      <div class="runnerrow"><span style="color:var(--text-2)">Executors</span><span class="mono" id="rb-executors">–</span></div>
      <div class="bar"><div id="rb-bar" style="width:0%"></div></div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:2px">
        <span class="healthdot"></span>
        <span class="mono" id="rb-health" style="color:var(--text-2);font-size:11px">healthy</span>
      </div>
    </div>
  </nav>
  <main id="main"></main>
</div>
<script>
'use strict';

/* ---------- status metadata ---------- */
const STATUS_META = {
  success:{label:'Success',icon:'✓'}, failed:{label:'Failed',icon:'✕'},
  running:{label:'Running',icon:'↻'}, queued:{label:'Queued',icon:'∙'},
  waiting:{label:'Waiting',icon:'∙'}, aborted:{label:'Aborted',icon:'■'},
};
function meta(s){
  const m = STATUS_META[s] || {label:s||'—',icon:'∙'};
  return {label:m.label, icon:m.icon, color:`var(--st-${s||'queued'})`, soft:`var(--st-${s||'queued'}-soft)`,
    anim: s==='running' ? 'pulse' : ''};
}
function statusBadge(s){
  const m = meta(s);
  return `<span class="badge-status" style="background:${m.soft};color:${m.color}"><span class="d ${m.anim}" style="background:${m.color}"></span>${m.label}</span>`;
}
function esc(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtTime(iso){ return iso ? new Date(iso).toLocaleString() : '–'; }
function fmtRelative(iso){
  if (!iso) return '–';
  const sec = Math.max(0, Math.round((Date.now() - new Date(iso).getTime())/1000));
  if (sec < 5) return 'now';
  if (sec < 60) return sec+'s ago';
  if (sec < 3600) return Math.floor(sec/60)+'m ago';
  if (sec < 86400) return Math.floor(sec/3600)+'h ago';
  return Math.floor(sec/86400)+'d ago';
}
function fmtDuration(startIso, endIso){
  if (!startIso) return '–';
  const end = endIso ? new Date(endIso) : new Date();
  const sec = Math.max(0, Math.round((end - new Date(startIso))/1000));
  if (sec < 60) return sec+'s';
  return Math.floor(sec/60)+'m '+(sec%60)+'s';
}

/* ---------- tiny fetch helper ---------- */
async function api(path, opts){
  const res = await fetch(path, opts);
  if (res.status === 401) { showLoginScreen(); throw new Error(path+': 401'); }
  if (!res.ok) throw new Error(path+': '+res.status);
  const ct = res.headers.get('content-type') || '';
  return ct.includes('application/json') ? res.json() : res.text();
}

/* ---------- auth ---------- */
let currentUser = null;
const ROLE_ORDER = { viewer: 1, operator: 2, admin: 3 };
function atLeast(role){ return !!currentUser && (ROLE_ORDER[currentUser.role]||0) >= ROLE_ORDER[role]; }
function canOperate(){ return atLeast('operator'); }
function isAdmin(){ return atLeast('admin'); }

async function checkAuth(){
  const me = await fetch('/api/me').then(r => r.json()).catch(() => ({authenticated:false}));
  currentUser = me.authenticated ? me : null;
  return !!currentUser;
}

function showLoginScreen(){
  currentUser = null;
  document.getElementById('shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-error').style.display = 'none';
  const pw = document.getElementById('login-password');
  if (pw) pw.value = '';
}

function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('shell').style.display = 'grid';
  document.getElementById('user-chip').style.display = 'flex';
  document.getElementById('user-av').textContent = (currentUser.username||'?').slice(0,1).toUpperCase();
  document.getElementById('user-name').textContent = currentUser.displayName || currentUser.username;
  document.getElementById('user-role').textContent = currentUser.role;
  document.getElementById('user-menu-username').textContent = currentUser.username;
  document.getElementById('nav-admin').style.display = isAdmin() ? '' : 'none';
}

function toggleUserMenu(ev){
  ev.stopPropagation();
  document.getElementById('user-menu').classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('user-menu').classList.remove('open'));

async function onLoginSubmit(ev){
  ev.preventDefault();
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-submit');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) {
      errEl.textContent = res.status === 401 ? 'Invalid username or password.'
        : res.status === 403 ? 'You are not authorized to use this system.'
        : res.status === 503 ? 'Authentication server is unreachable. Try again shortly.'
        : 'Sign-in failed.';
      errEl.style.display = 'block';
      return false;
    }
    await boot();
  } finally {
    btn.disabled = false;
  }
  return false;
}

async function doLogout(){
  await fetch('/api/logout', { method: 'POST' });
  showLoginScreen();
}

/* ---------- theme ---------- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').textContent = t === 'dark' ? '☀' : '☾';
  localStorage.setItem('rc-theme', t);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
(function initTheme(){
  const saved = localStorage.getItem('rc-theme');
  const preferred = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(preferred);
})();

/* ---------- router ---------- */
const routes = [];
function route(pattern, handler){ routes.push({re: new RegExp('^'+pattern.replace(/:[^/]+/g, '([^/]+)')+'$'), keys: (pattern.match(/:[^/]+/g)||[]).map(k=>k.slice(1)), handler}); }
function navigate(path){ location.hash = '#'+path; }
function currentPath(){ return (location.hash || '#/jobs').slice(1); }
async function renderRoute(){
  const path = currentPath();
  for (const r of routes) {
    const m = path.match(r.re);
    if (m) {
      const params = {};
      r.keys.forEach((k,i) => params[k] = decodeURIComponent(m[i+1]));
      updateNavHighlight(path);
      try { await r.handler(params); }
      catch (e) { document.getElementById('main').innerHTML = `<div class="page"><div class="emptystate">Failed to load: ${esc(e.message)}</div></div>`; }
      return;
    }
  }

    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:9px">
          ${statusBadge(build.status)}
          <h1 class="display" style="font-size:21px;margin:0">${esc(build.jobName)} <span class="sub">#${build.number}</span></h1>
        </div>
        <div class="mono sub" style="display:flex;gap:16px;flex-wrap:wrap">
          <span><span style="color:var(--text-3)">trigger</span> ${esc(build.trigger)}</span>
          <span><span style="color:var(--text-3)">queued</span> ${fmtTime(build.queuedAt)}</span>
          <span><span style="color:var(--text-3)">duration</span> ${fmtDuration(build.startedAt, build.finishedAt)}</span>
        </div>
        ${build.note ? `<div style="margin-top:9px;display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:4px 10px;border-radius:6px"><span style="color:var(--st-running)">&#10022;</span>${esc(build.note)}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px">
        ${canOperate() ? `<button class="btn" onclick="rebuildBuild(${build.id})">Rebuild</button>` : ''}
        ${canOperate() && (build.status==='running' || build.status==='queued') ? `<button class="btn danger" onclick="abortBuild(${build.id})">Abort</button>` : ''}
      </div>
    </div>
    <div class="gantt">${gantt}</div>`;

  const testFailCount = tests.filter(t => t.status === 'failed' || t.status === 'error').length;
  const tabs = [
    { id: 'steps', label: 'Steps', count: build.steps.length, fail: false },
    { id: 'tests', label: 'Tests', count: testFailCount ? testFailCount + ' failed' : tests.length, fail: testFailCount > 0 },
    { id: 'artifacts', label: 'Artifacts', count: artifacts.length, fail: false },
  ];

    <div class="tab ${activeBuildTab===t.id?'active':''}" onclick="switchBuildTab('${t.id}')">

function renderStepsTab(el, build){
  // A running step always auto-expands; mark that before rendering so its log container exists.
  build.steps.forEach(s => { if (s.status === 'running') expandedSteps[s.seq] = true; });

  el.innerHTML = build.steps.length === 0
    ? `<div class="emptystate">${build.status==='queued' ? 'Waiting to start…' : 'No steps recorded.'}</div>`
    : build.steps.map(s => renderStep(s, build.status)).join('');

  // Wire up live log streams for expanded steps. Re-rendering here (triggered by real
  // stage-start/stage-end/build-finished events over the global SSE feed, not a fixed-interval
  // poll) keeps this from tearing down an in-flight EventSource's DOM node every couple of
  // seconds while a step is still streaming.
  build.steps.forEach(s => {
    if (expandedSteps[s.seq]) loadStepLog(build, s);
  });
}

function renderTestsTab(el, tests){
  if (tests.length === 0) {
    el.innerHTML = `<div class="emptystate">No test results for this build.</div>`;
    return;
  }

  const passed = tests.filter(t => t.status === 'passed').length;
  const failed = tests.filter(t => t.status === 'failed' || t.status === 'error').length;
  const skipped = tests.filter(t => t.status === 'skipped').length;
  const summary = [
    { label: 'Passed', value: passed, color: 'var(--st-success)' },
    { label: 'Failed', value: failed, color: 'var(--st-failed)' },
    { label: 'Skipped', value: skipped, color: 'var(--st-queued)' },
    { label: 'Total', value: tests.length, color: 'var(--accent)' },
  ];

  el.innerHTML = `
    <div class="statgrid">
      ${summary.map(s => `
        <div class="statcard" style="border-left:3px solid ${s.color}">
          <div class="val display" style="color:${s.color}">${s.value}</div>
          <div class="lbl">${s.label}</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="thead" style="grid-template-columns:22px 1fr 150px 80px"><div></div><div>Test case</div><div>Suite</div><div style="text-align:right">Time</div></div>
      ${tests.map(t => {
        const isFail = t.status === 'failed' || t.status === 'error';
        const mark = t.status === 'passed' ? '&#10003;' : (t.status === 'skipped' ? '&#8211;' : '&#10007;');
        const color = isFail ? 'var(--st-failed)' : (t.status === 'skipped' ? 'var(--st-queued)' : 'var(--st-success)');
        const soft = isFail ? 'var(--st-failed-soft)' : (t.status === 'skipped' ? 'var(--st-queued-soft)' : 'var(--st-success-soft)');
        return `
        <div style="border-bottom:1px solid var(--border)">
          <div style="display:grid;grid-template-columns:22px 1fr 150px 80px;gap:12px;padding:9px 16px;align-items:center">
            <span style="width:16px;height:16px;border-radius:4px;background:${soft};color:${color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${mark}</span>
            <span class="mono" style="font-size:12px;${isFail?'color:var(--st-failed)':''}">${esc(t.name)}</span>
            <span class="sub" style="font-size:11.5px">${esc(t.suite || '')}</span>
            <span class="mono" style="font-size:11.5px;text-align:right">${t.durationMs != null ? t.durationMs+' ms' : '–'}</span>
          </div>
          ${t.message ? `<div style="margin:0 16px 10px 50px;padding:9px 12px;background:var(--st-failed-soft);border-radius:7px;font-family:ui-monospace,monospace;font-size:11px;color:var(--st-failed);white-space:pre-wrap">${esc(t.message)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

function fmtBytes(n){
  if (n == null) return '–';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}

function renderArtifactsTab(el, artifacts, buildId){
  if (artifacts.length === 0) {
    el.innerHTML = `<div class="emptystate">No artifacts for this build.</div>`;
    return;
  }

}

function renderStep(s, buildStatus){
  const sm = meta(s.status === 'running' ? 'running' : (s.status === 'failed' ? 'failed' : (s.status === 'success' ? 'success' : 'aborted')));
  const isExpanded = !!expandedSteps[s.seq];
  const borderColor = s.status === 'running' ? 'var(--st-running)' : (s.status === 'failed' ? 'var(--st-failed)' : 'var(--border)');
  return `
    <div class="step" style="border-color:${borderColor}">
      <div class="stephead" onclick="toggleStep(${s.seq})">
        <span class="stepicon ${s.status==='running'?'spin':''}" style="background:${sm.soft};color:${sm.color}">${s.status==='running' ? '&#8635;' : sm.icon}</span>
        <div style="display:flex;align-items:center;gap:9px;min-width:0">
          <span class="mono" style="font-size:11px;color:var(--text-3)">${String(s.seq).padStart(2,'0')}</span>
          <span style="font-weight:600;font-size:13.5px">${esc(s.name)}</span>
          ${s.post ? `<span class="mono" style="font-size:9px;padding:1px 6px;border-radius:4px;background:var(--surface-3);color:var(--text-3);text-transform:uppercase">post · ${esc(s.post)}</span>` : ''}
        </div>
        <span class="mono" style="color:var(--text-2)">${fmtDuration(s.startedAt, s.finishedAt)}</span>
        <span style="color:var(--text-3);font-size:12px;transform:rotate(${isExpanded?90:0}deg);transition:transform .15s;display:inline-block">&#9656;</span>
      </div>
      ${isExpanded ? `<div class="steplog" id="steplog-${s.seq}"><div class="sub" style="padding:8px 14px">Loading…</div></div>` : ''}
      ${s.error ? `<div style="margin:0 14px 12px;padding:9px 12px;background:var(--st-failed-soft);border-radius:7px;font-family:ui-monospace,monospace;font-size:11px;color:var(--st-failed);white-space:pre-wrap">${esc(s.error)}</div>` : ''}
    </div>`;
}

function toggleStep(seq){
  expandedSteps[seq] = !expandedSteps[seq];
  refreshBuildDetail(true);
}

function parseLogLine(line){
  const m = line.match(/^\[(\d{2}:\d{2}:\d{2}\.\d{3})\]\s?(.*)$/s);
  return m ? {t:m[1], text:m[2]} : {t:'', text:line};
}

async function loadStepLog(build, step){
  const el = document.getElementById(`steplog-${step.seq}`);
  if (!el) return;
  const isLiveBuild = build.status === 'running';
  const url = `/api/builds/${build.id}/log/stream`;

  if (!isLiveBuild || step.status !== 'running') {
    // Completed step (or completed build): fetch full/static log once and slice by offset.
    try {
      const full = await fetch(url).then(r => r.text());
      const start = step.logOffsetStart ?? 0;
      const end = step.logOffsetEnd ?? full.length;
      const slice = full.slice(start, end).split('\n').filter(Boolean);
      el.innerHTML = slice.map(l => { const p = parseLogLine(l); return `<div class="logline"><span class="t">${esc(p.t)}</span><span class="m">${esc(p.text)}</span></div>`; }).join('') || '<div class="sub" style="padding:8px 14px">(no output)</div>';
      el.scrollTop = el.scrollHeight;
    } catch (e) { el.innerHTML = `<div class="sub" style="padding:8px 14px">Failed to load log.</div>`; }
    return;
  }

  // Running step on a running build: stream live via SSE. The stream is per-build (not
  // per-step), so the very first message (backlog) is sliced at this step's known start
  // offset to approximate a step-scoped view; later messages are new content and used as-is.
  el.innerHTML = '';
  if (logSource) { logSource.close(); }
  logSource = new EventSource(url);
  let firstMessage = true;
  logSource.onmessage = (ev) => {
    let text = JSON.parse(ev.data);
    if (firstMessage) {
      firstMessage = false;
      // The offset was computed server-side at some earlier poll tick and can end up past the
      // backlog length actually delivered at subscribe time (control-file tailing and the
      // stdout pump race independently - see ci-runner-dsl-spec.md §4.3). Slicing past the end
      // of a string silently yields "", which would permanently blank the log; only trim when
      // the offset actually falls within what we received.
      const cut = step.logOffsetStart ?? 0;
      if (cut > 0 && cut < text.length) text = text.slice(cut);
    }
    text.split('\n').filter(Boolean).forEach(line => {
      const p = parseLogLine(line);
      const div = document.createElement('div');
      div.className = 'logline';
      div.innerHTML = `<span class="t">${esc(p.t)}</span><span class="m">${esc(p.text)}</span>`;
      el.appendChild(div);
    });
    el.scrollTop = el.scrollHeight;
  };
  logSource.onerror = async () => {
    // A transient error can happen right after the build starts (the log hub may not have
    // opened the file yet) - let EventSource's built-in auto-reconnect handle that rather than
    // closing permanently. Only tear down once the build has actually finished, falling back
    // to the static/sliced view for this step.
    if (!logSource) return;
    try {
      const freshBuild = await api(`/api/builds/${build.id}`);
      if (freshBuild.status !== 'running') {
        logSource.close();
        logSource = null;
        const freshStep = freshBuild.steps.find(x => x.seq === step.seq);
        if (freshStep) loadStepLog(freshBuild, freshStep);
      }
    } catch (e) { /* transient - EventSource will keep retrying */ }
  };
}

async function rebuildBuild(id){

  const build = await api(`/api/builds/${id}`);
  await triggerJob(build.jobName);
  navigate('/jobs/'+encodeURIComponent(build.jobName));
}

async function renderQueue(){
  const main = document.getElementById('main');
  const queue = await api('/api/queue');
  main.innerHTML = `
  <div class="page fade" style="max-width:960px">
    <h1 class="display">Queue</h1>
    <p class="sub" style="margin-bottom:20px">${queue.length} build${queue.length===1?'':'s'} waiting</p>
    <div id="queue-rows"></div>
  </div>`;
  const rowsEl = document.getElementById('queue-rows');
  if (queue.length === 0) { rowsEl.innerHTML = `<div class="emptystate">Queue is empty.</div>`; return; }
  rowsEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px">` + queue.map(q => {
    const m = meta(q.status);
    return `
    <div style="display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow)">
      <span class="mono" style="width:26px;height:26px;border-radius:8px;background:${m.soft};color:${m.color};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px">${q.position}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:8px">${esc(q.jobName)} <span class="mono sub">#${q.number}</span></div>
        <div class="mono sub" style="font-size:11px">${esc(q.trigger)} · queued ${fmtRelative(q.queuedAt)}</div>
      </div>
      ${statusBadge(q.status)}
    </div>`;
  }).join('') + `</div>`;
}

/* ================= ADMIN ================= */
route('/admin', renderAdmin);
let adminTab = 'users';
function switchAdminTab(id){ adminTab = id; renderAdmin(); }

async function renderAdmin(){
  const main = document.getElementById('main');
  if (!isAdmin()) { main.innerHTML = `<div class="page"><div class="emptystate">Admin access required.</div></div>`; return; }

  main.innerHTML = `
  <div class="page fade" style="max-width:960px">
    <h1 class="display">Admin</h1>
    <p class="sub" style="margin-bottom:20px">User roles and API tokens (spec §9)</p>
    <div class="tabbar">
      <div class="tab ${adminTab==='users'?'active':''}" onclick="switchAdminTab('users')">Users</div>
      <div class="tab ${adminTab==='tokens'?'active':''}" onclick="switchAdminTab('tokens')">API Tokens</div>
      <div class="tab ${adminTab==='audit'?'active':''}" onclick="switchAdminTab('audit')">Audit Log</div>
    </div>
    <div id="admin-content"></div>
  </div>`;

  const el = document.getElementById('admin-content');
  if (adminTab === 'tokens') renderAdminTokens(el);
  else if (adminTab === 'audit') renderAdminAudit(el);
  else renderAdminUsers(el);
}

async function renderAdminAudit(el){
  const entries = await api('/api/audit');
  if (entries.length === 0) { el.innerHTML = `<div class="emptystate">No audit log entries yet.</div>`; return; }
  el.innerHTML = `<div class="card">` + entries.map(e => `
    <div style="padding:10px 16px;border-bottom:1px solid var(--border)">
      <div style="display:flex;gap:10px;align-items:center;font-size:12.5px">
        <span class="mono" style="font-weight:600">${esc(e.action)}</span>
        <span class="sub">${esc(e.target || '')}</span>
        <span style="flex:1"></span>
        <span class="sub mono" style="font-size:11px">${esc(e.username)} · ${fmtRelative(e.at)}</span>
      </div>
      ${e.beforeJson || e.afterJson ? `<div class="mono sub" style="font-size:10.5px;margin-top:4px">${esc(e.beforeJson||'–')} &rarr; ${esc(e.afterJson||'–')}</div>` : ''}
    </div>`).join('') + `</div>`;
}

async function renderAdminUsers(el){
  const users = await api('/api/users');
  el.innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="thead" style="grid-template-columns:1.4fr 130px 1fr 90px"><div>Username</div><div>Role</div><div>Updated</div><div></div></div>
      <div>${users.length === 0 ? `<div style="padding:16px" class="sub">No explicit role assignments yet.</div>` : users.map(u => `
        <div class="trow" style="grid-template-columns:1.4fr 130px 1fr 90px">
          <div style="font-weight:600">${esc(u.username)}</div>
          <div class="mono">${esc(u.role)}</div>
          <div class="sub mono" style="font-size:11px">${fmtRelative(u.updatedAt)} · ${esc(u.updatedBy || '')}</div>
          <div style="text-align:right"><button class="btn danger" style="padding:5px 10px;font-size:12px" onclick="removeUserRole('${esc(u.username)}')">Remove</button></div>
        </div>`).join('')}</div>
    </div>
    <div class="card" style="padding:14px 16px">
      <div style="font-weight:600;margin-bottom:10px;font-size:13px">Assign role</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="au-username" placeholder="username" style="flex:1;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text)">
        <select id="au-role" class="rolesel"><option value="viewer">viewer</option><option value="operator">operator</option><option value="admin">admin</option></select>
        <button class="btn primary" onclick="assignUserRole()">Assign</button>
      </div>
      <div class="login-error" id="au-error" style="display:none;margin:10px 0 0"></div>
    </div>`;
}

async function assignUserRole(){
  const username = document.getElementById('au-username').value.trim();
  const role = document.getElementById('au-role').value;
  const errEl = document.getElementById('au-error');
  errEl.style.display = 'none';
  if (!username) return;
  const res = await fetch(`/api/users/${encodeURIComponent(username)}/role`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role }),
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    errEl.textContent = body.error || `Failed (${res.status})`;
    errEl.style.display = 'block';
    return;
  }
  renderAdmin();
}

async function removeUserRole(username){
  if (!confirm(`Remove role assignment for “${username}”? They will fall back to the configured default role.`)) return;
  const res = await fetch(`/api/users/${encodeURIComponent(username)}/role`, { method: 'DELETE' });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    alert(body.error || `Failed (${res.status})`);
    return;
  }
  renderAdmin();
}

async function renderAdminTokens(el){
  const tokens = await api('/api/tokens');
  el.innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="thead" style="grid-template-columns:1.2fr 100px 1fr 1fr 90px"><div>Name</div><div>Role</div><div>Created</div><div>Last used</div><div></div></div>
      <div>${tokens.length === 0 ? `<div style="padding:16px" class="sub">No API tokens issued yet.</div>` : tokens.map(t => `
        <div class="trow" style="grid-template-columns:1.2fr 100px 1fr 1fr 90px${t.revokedAt ? ';opacity:.5' : ''}">
          <div style="font-weight:600">${esc(t.name)}</div>
          <div class="mono">${esc(t.role)}</div>
          <div class="sub mono" style="font-size:11px">${fmtRelative(t.createdAt)} · ${esc(t.createdBy)}</div>
          <div class="sub mono" style="font-size:11px">${t.lastUsedAt ? fmtRelative(t.lastUsedAt) : 'never'}</div>
          <div style="text-align:right">${t.revokedAt ? `<span class="sub">revoked</span>` : `<button class="btn danger" style="padding:5px 10px;font-size:12px" onclick="revokeToken(${t.id})">Revoke</button>`}</div>
        </div>`).join('')}</div>
    </div>
    <div class="card" style="padding:14px 16px">
      <div style="font-weight:600;margin-bottom:10px;font-size:13px">Issue token</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="at-name" placeholder="name (e.g. jenkins-migration)" style="flex:1;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text)">
        <select id="at-role" class="rolesel"><option value="viewer">viewer</option><option value="operator">operator</option><option value="admin">admin</option></select>
        <button class="btn primary" onclick="issueToken()">Issue</button>
      </div>
    </div>`;
}

async function issueToken(){
  const name = document.getElementById('at-name').value.trim();
  const role = document.getElementById('at-role').value;
  if (!name) return;
  const res = await fetch('/api/tokens', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, role }),
  });
  if (!res.ok) { const body = await res.json().catch(() => ({})); alert(body.error || `Failed (${res.status})`); return; }
  const body = await res.json();
  prompt('Token issued. Copy it now — it will not be shown again:', body.token);
  renderAdmin();
}

async function revokeToken(id){
  if (!confirm('Revoke this token? Any client using it will immediately lose access.')) return;
  await fetch(`/api/tokens/${id}`, { method: 'DELETE' });
  renderAdmin();
}

/* ---------- global SSE: keep current view fresh ---------- */
function connectGlobalEvents(){
  const es = new EventSource('/api/events');
  es.onmessage = () => {
    refreshStatus();
    const path = currentPath();
    if (path === '/jobs') renderJobsList();
    else if (path.startsWith('/jobs/')) renderJobHistory({name: decodeURIComponent(path.slice(6))});
    else if (path.startsWith('/builds/')) refreshBuildDetail(false);
    else if (path === '/queue') renderQueue();
  };
}

/* ---------- boot ---------- */
let booted = false;
async function boot(){
  const authed = await checkAuth();
  if (!authed) { showLoginScreen(); return; }
  showApp();
  if (!booted) {
    booted = true;
    setInterval(refreshStatus, 5000);
    connectGlobalEvents();
  }
  refreshStatus();
  renderRoute();
}
boot();
</script>
