<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CI Runner</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2e38; --text: #e6e8ee; --muted: #9aa1ae;
    --accent: #4f8cff; --success: #34c759; --failed: #ff5a52; --running: #f5a623; --idle: #6b7280;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Meiryo, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  main { display: flex; height: calc(100vh - 49px); }
  #job-list { width: 280px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  #detail { flex: 1; overflow-y: auto; padding: 20px; }
  .job-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .job-item:hover { background: var(--panel); }
  .job-item.active { background: var(--panel); border-left: 3px solid var(--accent); }
  .job-name { font-weight: 600; font-size: 14px; }
  .job-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .badge.success { background: rgba(52,199,89,.15); color: var(--success); }
  .badge.failed, .badge.aborted { background: rgba(255,90,82,.15); color: var(--failed); }
  .badge.running { background: rgba(245,166,35,.15); color: var(--running); }
  .badge.queued, .badge.waiting { background: rgba(107,114,128,.2); color: var(--idle); }
  button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  button:hover { opacity: .9; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr.build-row { cursor: pointer; }
  tr.build-row:hover { background: var(--panel); }
  #log { background: #0a0b0e; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: Consolas, monospace; font-size: 12.5px; white-space: pre-wrap; word-break: break-all; max-height: 60vh; overflow-y: auto; margin-top: 12px; }
  .steps { margin-top: 12px; }
  .step { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; padding: 8px 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .muted { color: var(--muted); }
  a.back { color: var(--accent); cursor: pointer; font-size: 13px; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>CI Runner</h1>
  <span class="muted" id="conn-status"></span>
</header>
<main>
  <div id="job-list"></div>
  <div id="detail"><p class="muted">ジョブを選択してください</p></div>
</main>
<script>
const state = { selectedJob: null, selectedBuild: null, logSource: null };

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(`${path}: ${res.status}`);
  return res.headers.get('content-type')?.includes('application/json') ? res.json() : res.text();
}

function badge(status) {
  return `<span class="badge ${status}">${status}</span>`;
}

function fmtTime(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleString('ja-JP');
}

async function loadJobs() {
  const jobs = await api('/api/jobs');
  const list = document.getElementById('job-list');
  list.innerHTML = jobs.map(j => `
    <div class="job-item ${state.selectedJob === j.name ? 'active' : ''}" data-job="${j.name}">
      <div class="job-name">${j.name}</div>
      <div class="job-sub">
        ${j.latestBuild ? `#${j.latestBuild.number} ${badge(j.latestBuild.status)}` : '<span class="muted">ビルドなし</span>'}
      </div>
    </div>
  `).join('') || '<p class="muted" style="padding:16px">jobs/&lt;name&gt;/pipeline.cipipe を配置してください</p>';

  list.querySelectorAll('.job-item').forEach(el => {
    el.addEventListener('click', () => selectJob(el.dataset.job));
  });
}

async function selectJob(name) {
  state.selectedJob = name;
  state.selectedBuild = null;
  await loadJobs();
  await renderJobDetail(name);
}

async function renderJobDetail(name) {
  const builds = await api(`/api/jobs/${encodeURIComponent(name)}/builds`);
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0">${name}</h2>
      <button id="trigger-btn">手動トリガ</button>
    </div>
    <table>
      <thead><tr><th>#</th><th>状態</th><th>トリガ</th><th>投入時刻</th><th>所要</th></tr></thead>
      <tbody id="build-rows">
        ${builds.map(b => `
          <tr class="build-row" data-build="${b.id}">
            <td>${b.number}</td><td>${badge(b.status)}</td><td>${b.trigger}</td>
            <td>${fmtTime(b.queuedAt)}</td>
            <td>${duration(b.startedAt, b.finishedAt)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div id="build-detail"></div>
  `;
  document.getElementById('trigger-btn').addEventListener('click', async () => {
    await api(`/api/jobs/${encodeURIComponent(name)}/trigger`, { method: 'POST' });
    await renderJobDetail(name);
  });
  detail.querySelectorAll('.build-row').forEach(el => {
    el.addEventListener('click', () => selectBuild(parseInt(el.dataset.build, 10)));
  });
}

function duration(started, finished) {
  if (!started) return '-';
  const end = finished ? new Date(finished) : new Date();
  const sec = Math.round((end - new Date(started)) / 1000);
  return `${sec}s`;
}

async function selectBuild(id) {
  state.selectedBuild = id;
  if (state.logSource) { state.logSource.close(); state.logSource = null; }

  const build = await api(`/api/builds/${id}`);
  const container = document.getElementById('build-detail');
  container.innerHTML = `
    <h3>Build #${build.number} ${badge(build.status)}</h3>
    <div class="steps">
      ${build.steps.map(s => `
        <div class="step">
          <span>${s.name}${s.post ? ` <span class="muted">(post:${s.post})</span>` : ''}</span>
          ${badge(s.status)}
        </div>
        ${s.error ? `<div class="muted" style="margin:-4px 0 8px 12px">${escapeHtml(s.error)}</div>` : ''}
      `).join('') || '<p class="muted">ステージ情報なし</p>'}
    </div>
    <div id="log">(ログ読み込み中...)</div>
  `;

  const logEl = document.getElementById('log');
  logEl.textContent = '';
  const es = new EventSource(`/api/builds/${id}/log/stream`);
  state.logSource = es;
  es.onmessage = (ev) => {
    logEl.textContent += JSON.parse(ev.data);
    logEl.scrollTop = logEl.scrollHeight;
  };
  es.onerror = () => { es.close(); };
}

function escapeHtml(s) {
  return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function connectGlobalEvents() {
  const es = new EventSource('/api/events');
  const status = document.getElementById('conn-status');
  es.onopen = () => status.textContent = '● connected';
  es.onerror = () => status.textContent = '○ disconnected';
  es.onmessage = async (ev) => {
    const msg = JSON.parse(ev.data);
    if (state.selectedJob) await renderJobDetail(state.selectedJob);
    else await loadJobs();
    if (state.selectedBuild === msg.buildId && msg.type !== 'stage-start') {
      // refresh build detail (steps/status) without restarting the log stream
      const build = await api(`/api/builds/${msg.buildId}`);
      const stepsEl = document.querySelector('#build-detail .steps');
      if (stepsEl) {
        stepsEl.innerHTML = build.steps.map(s => `
          <div class="step">
            <span>${s.name}${s.post ? ` <span class="muted">(post:${s.post})</span>` : ''}</span>
            ${badge(s.status)}
          </div>
          ${s.error ? `<div class="muted" style="margin:-4px 0 8px 12px">${escapeHtml(s.error)}</div>` : ''}
        `).join('') || '<p class="muted">ステージ情報なし</p>';
      }
    }
  };
}

loadJobs();
connectGlobalEvents();
setInterval(() => { if (!state.selectedJob) loadJobs(); }, 5000);
</script>
</body>
</html>
