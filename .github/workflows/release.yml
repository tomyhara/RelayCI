name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.1). Must already exist."
        required: true

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    name: Build + publish GitHub Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tagName = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if ($tagName -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Tag '$tagName' does not match the expected vX.Y.Z format."
          }
          $version = $tagName.Substring(1)
          "tag=$tagName"       >> $env:GITHUB_OUTPUT
          "version=$version"   >> $env:GITHUB_OUTPUT

      # Release (not Debug): auth.localUsers, the Debug-only LDAP test double, is refused at
      # startup by design (spec §9) - Release is the correct and required configuration for a
      # distributable build.
      - name: Publish self-contained win-x64
        run: >
          dotnet publish src/CiRunner.Host -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/CiRunner.Host

      - name: Zip artifact
        shell: pwsh
        run: >
          Compress-Archive
          -Path publish/CiRunner.Host/*
          -DestinationPath RelayCI-${{ steps.version.outputs.version }}-win-x64.zip

      - name: Create GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "RelayCI-${{ steps.version.outputs.version }}-win-x64.zip" \
            --title "RelayCI ${{ steps.version.outputs.tag }}" \
            --generate-notes
