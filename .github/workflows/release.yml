name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.1). Must already exist."
        required: true

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    name: Build + publish GitHub Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tagName = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if ($tagName -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Tag '$tagName' does not match the expected vX.Y.Z format."
          }
          $version = $tagName.Substring(1)
          "tag=$tagName"       >> $env:GITHUB_OUTPUT
          "version=$version"   >> $env:GITHUB_OUTPUT

      # Release (not Debug): auth.localUsers, the Debug-only LDAP test double, is refused at
      # startup by design (spec §9) - Release is the correct and required configuration for a
      # distributable build.
      # PublishSingleFile collapses the ~340-file self-contained output into one .exe plus the
      # handful of files that must stay on disk (appsettings*.json, psmodule/ scripts loaded by
      # path, wwwroot/ static assets, web.config). DebugType=embedded folds the .pdb into the
      # assembly instead of shipping it as a separate file.
      - name: Publish self-contained win-x64
        run: >
          dotnet publish src/CiRunner.Host -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          -o publish/CiRunner.Host

      - name: Zip artifact
        shell: pwsh
        run: >
          Compress-Archive
          -Path publish/CiRunner.Host/*
          -DestinationPath RelayCI-${{ steps.version.outputs.version }}-win-x64.zip

      # Idempotent: a tag created through the GitHub UI's "Create a new release" flow publishes
      # an (asset-less, note-less) release together with the tag, which would make a plain
      # `gh release create` fail with "a release with the same tag name already exists". Update
      # that release in place instead of erroring out.
      - name: Create or update GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset="RelayCI-${{ steps.version.outputs.version }}-win-x64.zip"
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            # `gh release edit` has no --generate-notes (that's create-only); fetch the same
            # auto-generated notes body via the API and pass it through --notes instead.
            notes="$(gh api "repos/${{ github.repository }}/releases/generate-notes" -f "tag_name=$tag" --jq .body)"
            gh release edit "$tag" --title "RelayCI $tag" --notes "$notes"
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" --title "RelayCI $tag" --generate-notes
          fi
